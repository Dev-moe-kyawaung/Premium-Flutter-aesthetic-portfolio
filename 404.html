<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

       background: linear-gradient(135deg,#00E5FF,#69F0AE); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px; }
  p { color: #A0AFC0; font-size: 17px; margin-bottom: 40px; }
  a { display: inline-block; padding: 12px 32px; background: #00E5FF; color: #080B10; border-radius: 10px; font-weight: 700; font-size: 14px; text-decoration: none; transition: box-shadow .2s; }
  a:hover { box-shadow: 0 0 32px rgba(0,229,255,0.5); }
</style>
</head>
